services:
  - type: web
    name: unscripted-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: LLM_MODEL
        value: glm-4-flash
